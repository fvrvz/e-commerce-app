<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Confirmation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }
        .container {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 600px;
            background-color: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .header {
            text-align: center;
            color: #4CAF50;
            font-size: 24px;
            margin-bottom: 20px;
        }
        .content {
            font-size: 16px;
            line-height: 1.6;
            text-align: left;
            width: 100%;
        }
        .highlight {
            color: #4CAF50;
            font-weight: bold;
        }
        .footer {
            text-align: center;
            font-size: 14px;
            color: #888;
            margin-top: 20px;
        }
        ul {
            padding-left: 20px;
            list-style-type: disc;
        }
        li {
            margin-bottom: 10px; /* Adds space between each list item */
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .header {
                font-size: 22px;
            }
            .content {
                font-size: 15px;
            }
        }
        @media (max-width: 480px) {
            .header {
                font-size: 18px;
            }
            .content {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        Payment Confirmation
    </div>

    <div class="content">
        <p>Dear <span class="highlight" th:text="${customerName}">Customer</span>,</p>
        <p>We have received your payment of <span class="highlight" th:text="${amount}">amount</span> for your recent
            order. Here are the details:</p>
        <ul>
            <li><strong>Order Reference:</strong> <span class="highlight"
                                                        th:text="${orderReference}">Order Reference</span></li>
            <li><strong>Amount Paid:</strong> <span class="highlight" th:text="${amount}">Amount</span></li>
        </ul>

        <p style="padding: 1rem 0">Thank you for choosing us. Your payment has been successfully processed!</p>
    </div>

    <div class="footer">
        &copy; <span th:text="${#dates.format( #dates.createNow(), 'yyyy')}">2025</span> fvrvz | All rights
        reserved.
    </div>
</div>

</body>
</html>
