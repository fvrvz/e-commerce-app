server:
  port: 8040
spring:
  data:
    mongodb:
      username: ${MONGODB_USERNAME}
      password: ${MONGODB_PASSWORD}
      host: localhost
      port: 27017
      database: ${MONGODB_NOTIFICATION_SERVICE_DB}
      authentication-database: ${MONGODB_NOTIFICATION_SERVICE_AUTH_DB}
    kafka:
      consumer:
        bootstrap-servers:
          - localhost:9092
        group-id: paymentGroup,orderGroup
        auto-offset-reset: earliest
        key-deserializer: org.apache.kafka.common.serialization.StringSerializer
        value-deserializer: org.springframework.kafka.support.serializer.JsonSerializer
        properties:
          spring.json.trusted.packages: 'com.fvrvz.ecommerce'
          spring.json.type.mapping: paymentConfirmation:com.fvrvz.ecommerce.records.PaymentNotificationRequest,orderConfirmation:com.fvrvz.ecommerce.records.OrderConfirmation
    mail:
      host: localhost
      port: 1025
      username: admin
      password: admin
      properties:
        mail:
          smtp:
            trust: "*"
          auth: true
          starttls:
            enabled: true
          connectiontimeout: 5000
          timeout: 3000
          writetimeout: 5000
